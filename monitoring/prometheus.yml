global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-english-analyzer'

# Ескерту ережелері файлы
rule_files:
  - "alert-rules.yml"

# Alertmanager байланысы
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Метрика жинау мақсаттары
scrape_configs:
  # Prometheus өзі
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter — сервер ресурстары (CPU, RAM, диск)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'server'

  # Next.js қосымшасы (healthcheck)
  - job_name: 'app'
    metrics_path: '/api/health'
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'nextjs-app'
    scrape_interval: 30s

  # PostgreSQL — postgres-exporter арқылы (опционалды)
  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
        labels:
          service: 'database'
    scrape_interval: 60s
