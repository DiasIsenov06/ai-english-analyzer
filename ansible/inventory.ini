# Ansible Inventory — Сервер тізімі
# IP мекенжайларын нақты серверлеріңізбен ауыстырыңыз

[app_servers]
prod-server ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# Бірнеше сервер болса:
# prod-server-1 ansible_host=1.2.3.4 ansible_user=ubuntu
# prod-server-2 ansible_host=5.6.7.8 ansible_user=ubuntu

[monitoring]
prod-server

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
